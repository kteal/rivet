name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check
      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets --all-features -- -D warnings -D clippy::all -D clippy::pedantic -D clippy::nursery
      - name: Build
        run: nix develop --command cargo build --locked --all-targets --all-features
      - name: Test
        run: nix develop --command cargo nextest run --locked --all-targets --all-features
      - name: Build package
        run: nix build
      - name: Flake check
        run: nix flake check
